<!DOCTYPE html>
<html>

<head>

    <title>Task Manager</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f5f5f5;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }
        .dashboard {

    display: flex;

    justify-content: space-between;

    margin-top: 20px;

    gap: 10px;
}

.card {

    background: #f5f5f5;

    padding: 15px;

    border-radius: 10px;

    text-align: center;

    flex: 1;
}

.card h3 {

    margin: 0;
}

    </style>

</head>

<body>

<div class="container">

    <h1>Task Manager</h1>

    <div class="input-section">

        <input type="text"
               id="taskInput"
               placeholder="Enter task">

        <button onclick="addTask()">
            Add
        </button>

    </div>
    <div class="dashboard">

    <div class="card">
        <h3>Total</h3>
        <p id="totalTasks">0</p>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <p id="pendingTasks">0</p>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <p id="completedTasks">0</p>
    </div>

</div>

    <ul id="taskList"></ul>

</div>

<script>

const userId = "demo_user_1";

async function fetchTasks() {

    const response = await fetch(
        `http://localhost:5000/tasks/${userId}`
    );

    const tasks = await response.json();
    const total = tasks.length;

const pending = tasks.filter(

    task => task.status === "Pending"

).length;

const completed = tasks.filter(

    task => task.status === "Completed"

).length;

    const taskList = document.getElementById('taskList');

    taskList.innerHTML = '';
    document.getElementById(
    'totalTasks'
).innerText = total;

document.getElementById(
    'pendingTasks'
).innerText = pending;

document.getElementById(
    'completedTasks'
).innerText = completed;

    tasks.forEach(task => {

        taskList.innerHTML += `

            <li>

    <strong>${task.task}</strong>

    <br>

    Status: ${task.status}

<br><br>

<button onclick="updateStatus('${task._id}')">
    Change Status
</button>
    <br><br>

    <button onclick="editTask('${task._id}', '${task.task}')">
    Edit
</button>

<button onclick="deleteTask('${task._id}')">
    Delete
</button>

</li>
        `;
    });
}

async function addTask() {

    const task = document.getElementById('taskInput').value;

    await fetch('http://localhost:5000/tasks', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({

            task: task,

            userId: userId
        })
    });

    document.getElementById('taskInput').value = '';

    fetchTasks();
}
async function deleteTask(id) {

    await fetch(

        `http://localhost:5000/tasks/${id}`,

        {
            method: 'DELETE'
        }
    );

    fetchTasks();
}
async function editTask(id, oldTask) {

    const newTask = prompt(

        "Edit Task",

        oldTask
    );

    if(newTask) {

        await fetch(

            `http://localhost:5000/tasks/${id}`,

            {

                method: 'PUT',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    task: newTask
                })
            }
        );

        fetchTasks();
    }
    async function updateStatus(id) {

    await fetch(

        `http://localhost:5000/tasks/status/${id}`,

        {
            method: 'PUT'
        }
    );

    fetchTasks();
}
}

fetchTasks();

</script>

</body>
</html>
