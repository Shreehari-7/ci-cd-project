<!DOCTYPE html>
<html>

<head>

    <title>Advanced Task Manager</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {

            background: white;

            width: 650px;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1, h2 {

            text-align: center;
        }

        .input-section {

            display: flex;

            flex-direction: column;

            gap: 10px;
        }

        input, select {

            padding: 12px;

            border-radius: 8px;

            border: 1px solid #ccc;
        }

        button {

            padding: 10px;

            border: none;

            border-radius: 8px;

            background: #4facfe;

            color: white;

            cursor: pointer;

            margin-top: 5px;
        }

        ul {

            list-style: none;

            padding: 0;
        }

        li {

            background: #f5f5f5;

            padding: 15px;

            margin-top: 10px;

            border-radius: 10px;
        }

        .dashboard {

            display: flex;

            justify-content: space-between;

            gap: 10px;

            margin-top: 20px;
        }

        .card {

            background: #f5f5f5;

            padding: 15px;

            flex: 1;

            text-align: center;

            border-radius: 10px;
        }

        .progress-container {

            width: 100%;

            height: 25px;

            background: #ddd;

            border-radius: 20px;

            overflow: hidden;

            margin-top: 20px;
        }

        #progressBar {

            height: 100%;

            width: 0%;

            background: #2ecc71;
        }

        #progressText {

            text-align: center;

            font-weight: bold;
        }

        .dark-mode {

            background: #121212;

            color: white;
        }

        .dark-mode .container {

            background: #1e1e1e;
        }

        .dark-mode li {

            background: #2c2c2c;
        }

        hr {

            margin: 20px 0;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Signup</h2>

    <input type="text"
           id="signupUsername"
           placeholder="Username">

    <input type="email"
           id="signupEmail"
           placeholder="Email">

    <input type="password"
           id="signupPassword"
           placeholder="Password">

    <button onclick="signup()">
        Signup
    </button>

    <hr>

    <h2>Login</h2>

    <input type="email"
           id="loginEmail"
           placeholder="Email">

    <input type="password"
           id="loginPassword"
           placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <hr>

    <h1>Task Manager</h1>

    <button onclick="logout()">
        Logout
    </button>

    <button onclick="toggleDarkMode()">
        Dark Mode
    </button>

    <div class="input-section">

        <input type="text"
               id="taskInput"
               placeholder="Enter task">

        <select id="priority">

            <option>High</option>

            <option selected>Medium</option>

            <option>Low</option>

        </select>

        <input type="date"
               id="deadline">

        <button onclick="addTask()">
            Add
        </button>

    </div>

    <div class="dashboard">

        <div class="card">

            <h3>Total</h3>

            <p id="totalTasks">0</p>

        </div>

        <div class="card">

            <h3>Pending</h3>

            <p id="pendingTasks">0</p>

        </div>

        <div class="card">

            <h3>Completed</h3>

            <p id="completedTasks">0</p>

        </div>

    </div>

    <canvas id="taskChart"></canvas>

    <div class="progress-container">

        <div id="progressBar"></div>

    </div>

    <p id="progressText"></p>

    <ul id="taskList"></ul>

</div>

<script>

const userId = "demo_user_1";

const token =
    localStorage.getItem('token');

let taskChart;

async function signup() {

    const username =
        document.getElementById(
            'signupUsername'
        ).value;

    const email =
        document.getElementById(
            'signupEmail'
        ).value;

    const password =
        document.getElementById(
            'signupPassword'
        ).value;

    const response = await fetch(

        'http://localhost:5000/signup',

        {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                username,

                email,

                password
            })
        }
    );

    const data = await response.json();

    alert(data.message);
}

async function login() {

    const email =
        document.getElementById(
            'loginEmail'
        ).value;

    const password =
        document.getElementById(
            'loginPassword'
        ).value;

    const response = await fetch(

        'http://localhost:5000/login',

        {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                email,

                password
            })
        }
    );

    const data = await response.json();

    if(data.token) {

        localStorage.setItem(

            'token',

            data.token
        );

        alert("Login Successful");

        location.reload();

    } else {

        alert(data.message);
    }
}

function logout() {

    localStorage.removeItem('token');

    alert("Logged Out");

    location.reload();
}

async function fetchTasks() {

    if(!token) return;

    const response = await fetch(

        `http://localhost:5000/tasks/${userId}`,

        {

            headers: {

                authorization: token
            }
        }
    );

    const tasks = await response.json();

    const total = tasks.length;

    const pending = tasks.filter(

        task => task.status === "Pending"

    ).length;

    const completed = tasks.filter(

        task => task.status === "Completed"

    ).length;

    const inProgress = tasks.filter(

        task => task.status === "In Progress"

    ).length;

    const progress = total > 0

        ? Math.round((completed / total) * 100)

        : 0;

    document.getElementById(
        'totalTasks'
    ).innerText = total;

    document.getElementById(
        'pendingTasks'
    ).innerText = pending;

    document.getElementById(
        'completedTasks'
    ).innerText = completed;

    document.getElementById(
        'progressBar'
    ).style.width = `${progress}%`;

    document.getElementById(
        'progressText'
    ).innerText =
        `${progress}% Tasks Completed`;

    const ctx =
        document.getElementById('taskChart');

    if(taskChart) {

        taskChart.destroy();
    }

    taskChart = new Chart(ctx, {

        type: 'pie',

        data: {

            labels: [

                'Pending',

                'Completed',

                'In Progress'
            ],

            datasets: [{

                data: [

                    pending,

                    completed,

                    inProgress
                ],

                backgroundColor: [

                    '#f39c12',

                    '#2ecc71',

                    '#3498db'
                ]
            }]
        }
    });

    const taskList =
        document.getElementById('taskList');

    taskList.innerHTML = '';

    tasks.forEach(task => {

        const today = new Date()

            .toISOString()

            .split('T')[0];

        const overdue =

            task.deadline < today

            && task.status !== "Completed";

        taskList.innerHTML += `

            <li>

                <strong>${task.task}</strong>

                <br>

                Status: ${task.status}

                <br>

                Priority: ${task.priority}

                <br>

                Deadline: ${task.deadline}

                <br>

                ${overdue
                    ? '<span style="color:red;">Overdue</span>'
                    : ''
                }

                <br><br>

                <button onclick="updateStatus('${task._id}')">

                    Change Status

                </button>

                <button onclick="editTask(

                    '${task._id}',

                    '${task.task}'

                )">

                    Edit

                </button>

                <button onclick="deleteTask('${task._id}')">

                    Delete

                </button>

            </li>
        `;
    });
}

async function addTask() {

    const task =
        document.getElementById('taskInput').value;

    const priority =
        document.getElementById('priority').value;

    const deadline =
        document.getElementById('deadline').value;

    await fetch(

        'http://localhost:5000/tasks',

        {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json',

                authorization: token
            },

            body: JSON.stringify({

                task: task,

                userId: userId,

                priority: priority,

                deadline: deadline
            })
        }
    );

    document.getElementById(
        'taskInput'
    ).value = '';

    fetchTasks();
}

async function deleteTask(id) {

    await fetch(

        `http://localhost:5000/tasks/${id}`,

        {

            method: 'DELETE',

            headers: {

                authorization: token
            }
        }
    );

    fetchTasks();
}

async function editTask(id, oldTask) {

    const newTask = prompt(

        "Edit Task",

        oldTask
    );

    if(newTask) {

        await fetch(

            `http://localhost:5000/tasks/${id}`,

            {

                method: 'PUT',

                headers: {

                    'Content-Type': 'application/json',

                    authorization: token
                },

                body: JSON.stringify({

                    task: newTask
                })
            }
        );

        fetchTasks();
    }
}

async function updateStatus(id) {

    await fetch(

        `http://localhost:5000/tasks/status/${id}`,

        {

            method: 'PUT',

            headers: {

                authorization: token
            }
        }
    );

    fetchTasks();
}

function toggleDarkMode() {

    document.body.classList.toggle(
        'dark-mode'
    );
}

fetchTasks();

</script>

</body>
</html>
