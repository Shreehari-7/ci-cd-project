<!DOCTYPE html>
<html>

<head>

    <title>Advanced Task Manager</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {

            margin: 0;

            padding: 0;

            font-family: Arial;

            background: linear-gradient(
                to right,
                #4facfe,
                #00f2fe
            );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .container {

            background: white;

            width: 700px;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        input, select, button {

            width: 100%;

            padding: 12px;

            margin-top: 10px;

            border-radius: 8px;

            border: 1px solid #ccc;
        }

        button {

            background: #4facfe;

            color: white;

            border: none;

            cursor: pointer;
        }

        ul {

            list-style: none;

            padding: 0;
        }

        li {

            background: #f5f5f5;

            padding: 15px;

            margin-top: 10px;

            border-radius: 10px;
        }

        .dashboard {

            display: flex;

            justify-content: space-between;

            margin-top: 20px;
        }

        .dark-mode {

            background: #121212;

            color: white;
        }

        .dark-mode .container {

            background: #1e1e1e;
        }

        .dark-mode li {

            background: #2c2c2c;
        }

        .progress-container {

            width: 100%;

            height: 25px;

            background: #ddd;

            border-radius: 20px;

            overflow: hidden;

            margin-top: 20px;
        }

        #progressBar {

            height: 100%;

            width: 0%;

            background: #2ecc71;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Signup</h2>

    <input type="text"
           id="signupUsername"
           placeholder="Username">

    <input type="email"
           id="signupEmail"
           placeholder="Email">

    <input type="password"
           id="signupPassword"
           placeholder="Password">

    <button onclick="signup()">
        Signup
    </button>

    <hr>

    <h2>Login</h2>

    <input type="email"
           id="loginEmail"
           placeholder="Email">

    <input type="password"
           id="loginPassword"
           placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <hr>

    <h1>Task Manager</h1>

    <button onclick="logout()">
        Logout
    </button>

    <button onclick="toggleDarkMode()">
        Dark Mode
    </button>

    <input type="text"
           id="taskInput"
           placeholder="Enter task">

    <select id="priority">

        <option>High</option>

        <option selected>Medium</option>

        <option>Low</option>

    </select>

    <input type="date"
           id="deadline">

    <button onclick="addTask()">
        Add Task
    </button>

    <div class="dashboard">

        <div>
            Total:
            <span id="totalTasks">0</span>
        </div>

        <div>
            Pending:
            <span id="pendingTasks">0</span>
        </div>

        <div>
            Completed:
            <span id="completedTasks">0</span>
        </div>

    </div>

    <canvas id="taskChart"></canvas>

    <div class="progress-container">

        <div id="progressBar"></div>

    </div>

    <p id="progressText"></p>

    <ul id="taskList"></ul>

    <hr>

    <h2>Admin Dashboard</h2>

    <button onclick="loadAdminData()">
        Load Admin Data
    </button>

    <h3>Total Users</h3>

    <p id="adminUsersCount">0</p>

    <ul id="adminUsers"></ul>

    <h3>All Tasks</h3>

    <ul id="adminTasks"></ul>

</div>

<script src="http://localhost:5000/socket.io/socket.io.js"></script>

<script>

const socket = io('http://localhost:5000');

const userId = "demo_user_1";

const token = localStorage.getItem('token');

let taskChart;

socket.on('taskUpdated', () => {

    fetchTasks();
});

async function signup() {

    const username =
        document.getElementById(
            'signupUsername'
        ).value;

    const email =
        document.getElementById(
            'signupEmail'
        ).value;

    const password =
        document.getElementById(
            'signupPassword'
        ).value;

    const response = await fetch(

        'http://localhost:5000/signup',

        {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                username,

                email,

                password
            })
        }
    );

    const data = await response.json();

    alert(data.message);
}

async function login() {

    const email =
        document.getElementById(
            'loginEmail'
        ).value;

    const password =
        document.getElementById(
            'loginPassword'
        ).value;

    const response = await fetch(

        'http://localhost:5000/login',

        {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                email,

                password
            })
        }
    );

    const data = await response.json();

    if(data.token) {

        localStorage.setItem(
            'token',
            data.token
        );

        alert("Login Successful");

        location.reload();
    }
}

function logout() {

    localStorage.removeItem('token');

    location.reload();
}

async function fetchTasks() {

    if(!token) return;

    const response = await fetch(

        `http://localhost:5000/tasks/${userId}`,

        {

            headers: {
                authorization: token
            }
        }
    );

    const tasks = await response.json();

    const total = tasks.length;

    const pending = tasks.filter(

        task => task.status === "Pending"

    ).length;

    const completed = tasks.filter(

        task => task.status === "Completed"

    ).length;

    const progress = total > 0

        ? Math.round((completed / total) * 100)

        : 0;

    document.getElementById(
        'totalTasks'
    ).innerText = total;

    document.getElementById(
        'pendingTasks'
    ).innerText = pending;

    document.getElementById(
        'completedTasks'
    ).innerText = completed;

    document.getElementById(
        'progressBar'
    ).style.width = `${progress}%`;

    document.getElementById(
        'progressText'
    ).innerText =
        `${progress}% Tasks Completed`;

    const taskList =
        document.getElementById('taskList');

    taskList.innerHTML = '';

    tasks.forEach(task => {

        taskList.innerHTML += `

            <li>

                <strong>${task.task}</strong>

                <br>

                ${task.status}

                <br>

                ${task.priority}

                <br>

                ${task.deadline}

                <br><br>

                <button onclick="updateStatus('${task._id}')">
                    Status
                </button>

                <button onclick="editTask('${task._id}', '${task.task}')">
                    Edit
                </button>

                <button onclick="deleteTask('${task._id}')">
                    Delete
                </button>

            </li>
        `;
    });
}

async function addTask() {

    const task =
        document.getElementById('taskInput').value;

    const priority =
        document.getElementById('priority').value;

    const deadline =
        document.getElementById('deadline').value;

    await fetch(

        'http://localhost:5000/tasks',

        {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json',

                authorization: token
            },

            body: JSON.stringify({

                task,

                userId,

                priority,

                deadline
            })
        }
    );
}

async function deleteTask(id) {

    await fetch(

        `http://localhost:5000/tasks/${id}`,

        {

            method: 'DELETE',

            headers: {
                authorization: token
            }
        }
    );
}

async function editTask(id, oldTask) {

    const newTask = prompt(
        "Edit Task",
        oldTask
    );

    await fetch(

        `http://localhost:5000/tasks/${id}`,

        {

            method: 'PUT',

            headers: {

                'Content-Type': 'application/json',

                authorization: token
            },

            body: JSON.stringify({

                task: newTask
            })
        }
    );
}

async function updateStatus(id) {

    await fetch(

        `http://localhost:5000/tasks/status/${id}`,

        {

            method: 'PUT',

            headers: {
                authorization: token
            }
        }
    );
}

async function loadAdminData() {

    const usersResponse = await fetch(

        'http://localhost:5000/admin/users',

        {

            headers: {
                authorization: token
            }
        }
    );

    const users = await usersResponse.json();

    document.getElementById(
        'adminUsersCount'
    ).innerText = users.length;

    const adminUsers =
        document.getElementById('adminUsers');

    adminUsers.innerHTML = '';

    users.forEach(user => {

        adminUsers.innerHTML += `

            <li>

                ${user.username} - ${user.role}

            </li>
        `;
    });

    const tasksResponse = await fetch(

        'http://localhost:5000/admin/tasks',

        {

            headers: {
                authorization: token
            }
        }
    );

    const tasks = await tasksResponse.json();

    const adminTasks =
        document.getElementById('adminTasks');

    adminTasks.innerHTML = '';

    tasks.forEach(task => {

        adminTasks.innerHTML += `

            <li>

                ${task.task} - ${task.status}

            </li>
        `;
    });
}

function toggleDarkMode() {

    document.body.classList.toggle(
        'dark-mode'
    );
}

fetchTasks();

</script>

</body>
</html>
