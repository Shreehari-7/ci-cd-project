<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>

body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    width: 450px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

.input-section {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}

input:focus {
    outline: none;
    border-color: #4facfe;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

button:hover {
    opacity: 0.8;
}

.add-btn {
    background: #4facfe;
    color: white;
}

.edit-btn {
    background: #f39c12;
    color: white;
    margin-left: 10px;
}

.delete-btn {
    background: #e74c3c;
    color: white;
    margin-left: 5px;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #f7f7f7;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.task-buttons {
    display: flex;
}

</style>
</head>

<body>

<div class="container">

    <h1>Task Manager</h1>

    <div class="input-section">

    <input type="text" id="taskInput" placeholder="Enter task">

    <button class="add-btn" onclick="addTask()">
        Add
    </button>

</div>

    <ul id="taskList"></ul>

</div>

<script>

async function fetchTasks() {

    const response = await fetch('http://localhost:5000/tasks');

    const tasks = await response.json();

    const taskList = document.getElementById('taskList');

    taskList.innerHTML = '';

    tasks.forEach(task => {

        taskList.innerHTML += `
    <li>

        <div>

    <strong>${task.task}</strong>

    <br>

    <small>Status: ${task.status}</small>

</div>

        <div class="task-buttons">

    <button class="edit-btn"
        onclick="updateStatus('${task._id}')">
        Status
    </button>

    <button class="edit-btn"
        onclick="editTask('${task._id}', '${task.task}')">
        Edit
    </button>

    <button class="delete-btn"
        onclick="deleteTask('${task._id}')">
        Delete
    </button>

</div>

    </li>
`;
    });
}

async function addTask() {

    const task = document.getElementById('taskInput').value;

    await fetch('http://localhost:5000/tasks', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ task })
    });

    document.getElementById('taskInput').value = '';

    fetchTasks();
}
async function deleteTask(id) {

    await fetch(`http://localhost:5000/tasks/${id}`, {
        method: 'DELETE'
    });

    fetchTasks();
}
async function editTask(id, oldTask) {

    const newTask = prompt("Edit Task", oldTask);

    if(newTask) {

        await fetch(`http://localhost:5000/tasks/${id}`, {

            method: 'PUT',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                task: newTask
            })
        });

        fetchTasks();
    }
}
async function updateStatus(id) {

    await fetch(`http://localhost:5000/tasks/status/${id}`, {

        method: 'PUT'
    });

    fetchTasks();
}

fetchTasks();

</script>

</body>
</html>
