name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: '18'

    - run: npm install
    
    - name: Check Node version
      run: node -v

    - run: node app.js

    - name: Run simple test
      run: echo "Testing pipeline successful"