name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Install Dependencies
      - name: Install Dependencies
        run: npm install

      # Check Node Version
      - name: Check Node Version
        run: node -v

      # Start Application
      - name: Start Server
        run: |
          node app.js &
          sleep 10

      # Test API Route
      - name: Test Backend Route
        run: curl http://localhost:3000/

      # Pipeline Test
      - name: Run Simple Test
        run: echo "CI Pipeline Working Successfully"

      # Success Message
      - name: Finish Workflow
        run: echo "Build Completed Successfully"